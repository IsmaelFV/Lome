name: lome_app
description: "LOME - Plataforma SaaS para restaurantes"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # -- State Management --
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # -- Routing --
  go_router: ^14.8.1

  # -- Backend / Supabase --
  supabase_flutter: ^2.8.4

  # -- Serialization --
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # -- Functional Programming --
  dartz: ^0.10.1

  # -- UI / Animations --
  flutter_animate: ^4.5.2
  rive: ^0.13.20
  lottie: ^3.3.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # -- Utilities --
  intl: ^0.20.2
  equatable: ^2.0.7
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  collection: ^1.19.1

  # -- Media --
  image_picker: ^1.1.2

  # -- Icons --
  cupertino_icons: ^1.0.8
  phosphor_flutter: ^2.1.0

  # -- Local Storage --
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # -- Monitoring --
  sentry_flutter: ^9.0.0

  # -- Push Notifications --
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^18.0.0

  # -- Misc --
  url_launcher: ^6.3.1
  logger: ^2.5.0
  http: ^1.3.0

  # -- Printing --
  pdf: ^3.11.1
  printing: ^5.13.3

  # -- QR Code --
  qr_flutter: ^4.1.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # -- Code Generation --
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.4
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.4

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
